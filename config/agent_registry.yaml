        priority: P0
        module: src.agents.category_b.standard_matching
        class: StandardMatchingAgent
        description: 课程标准与教材匹配分析
        pipeline_next: B1.3
      - id: B1.3
        name: 单元主题架构
        priority: P0
        module: src.agents.category_b.unit_theme
        class: UnitThemeAgent
        description: 单元主题架构设计
        pipeline_next: B1.4
      - id: B1.4
        name: 单元细化主题
        priority: P0
        module: src.agents.category_b.unit_detail
        class: UnitDetailAgent
        description: 单元主题细化与展开
        pipeline_next: B1.5
      - id: B1.5
        name: 大纲整合输出
        priority: P0
        module: src.agents.category_b.outline_integration
        class: OutlineIntegrationAgent
        description: 课程大纲整合与输出
        pipeline_next: B2.1
      - id: B2.1
        name: 单节课时设计
        priority: P0
        module: src.agents.category_b.lesson_design
