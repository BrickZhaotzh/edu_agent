# 智能体注册表
categories:
  A:
    name: 课程产品方案
    description: 课程产品规划与立项阶段的智能体
    agents:
      - id: A1.1
        name: 政策洞察分析
        priority: P0
        module: src.agents.category_a.policy_insight
        class: PolicyInsightAgent
        description: 多渠道政策检索+课标映射+课程适配建议
        knowledge: [科创教育专家知识库]
      - id: A2.1
        name: 行业竞品调研
        priority: P0
        module: src.agents.category_a.competitor_research
        class: CompetitorResearchAgent
        description: 竞品信息抓取+结构化对比+差异点提炼
        knowledge: [competitor_reports]
      - id: A2.2
        name: 用户痛点分析
        priority: P1
        module: src.agents.category_a.user_pain_point
        class: UserPainPointAgent
        description: 调研问卷生成+数据分析+用户画像建模
      - id: A3.1
        name: 课程立项书
        priority: P1
        module: src.agents.category_a.course_proposal
        class: CourseProposalAgent
        description: 商业模式框架+多方案推演+可行性分析
      - id: A4.1
        name: Demo课设计
        priority: P1
        module: src.agents.category_a.demo_design
        class: DemoDesignAgent
        description: 基于优秀课例知识库的课程设计
      - id: A5.1
        name: Demo评分模型
        priority: P2
        module: src.agents.category_a.demo_scoring
        class: DemoScoringAgent
        description: 多维度评分标准+自动评审
      - id: A6.1
        name: 生态资源评估
        priority: P2
        module: src.agents.category_a.resource_assessment
        class: ResourceAssessmentAgent
        description: 资源录入+分类标签+复用性评估

  B:
    name: 课程方案
